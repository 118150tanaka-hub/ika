<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Viewer</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#111;
      color:white;
      font-family:sans-serif;

      width:100%;
      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:40px;
    }

    .container{
      width:100%;
      max-width:1100px;

      display:flex;
      flex-direction:column;
      align-items:center;

      gap:20px;
    }

    .viewer{

      width:100%;
      
      display:flex;
      justify-content:center;
      align-items:center;
      background:#222;

      border-radius:16px;

      overflow:hidden;

      position:relative;

      box-shadow:
      0 10px 40px rgba(0,0,0,0.5);

      cursor:pointer;
      
    }

    .slide{
      display:none;

      width:100%;

      justify-content:center;
      align-items:center;
    }

    .slide.active{
      display:flex;
    }

    .slide img{
      max-width:100%;
      max-height:85vh;

      width:auto;
      height:auto;

      object-fit:contain;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:20px;
    }

    button{

      padding:14px 28px;

      border:none;

      border-radius:10px;

      cursor:pointer;

      font-size:16px;

      background:white;
      color:black;

      transition:0.2s;
    }

    button:hover{
      opacity:0.8;
      transform:translateY(-2px);
    }

    .page{
      opacity:0.8;
      font-size:15px;
    }

    /* フルスクリーン */

    .fullscreen{

      position:fixed;

      inset:0;

      background:black;

      display:none;

      justify-content:center;
      align-items:center;

      z-index:9999;
    }

    .fullscreen.active{
      display:flex;
    }

    .fullscreen img{

      width:100%;
      height:100%;

      object-fit:contain;
    }

    .close-btn{

      position:absolute;

      top:20px;
      right:20px;

      background:white;
      color:black;

      border:none;

      padding:10px 16px;

      border-radius:10px;

      cursor:pointer;

      z-index:10000;
    }

    @media(max-width:768px){

      body{
        padding:20px;
      }

      button{
        padding:12px 20px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <!-- スライド -->

    <div class="viewer" id="viewer">

      <!-- P1〜P21 -->

      <div class="slide active">
        <img src="images/p1.jpg" alt="P1">
      </div>

      <div class="slide">
        <img src="images/p2.jpg" alt="P2">
      </div>

      <div class="slide">
        <img src="images/p3.jpg" alt="P3">
      </div>

      <div class="slide">
        <img src="images/p4.jpg" alt="P4">
      </div>

      <div class="slide">
        <img src="images/p5.png" alt="P5">
      </div>

      <div class="slide">
        <img src="images/p6.jpg" alt="P6">
      </div>

      <div class="slide">
        <img src="images/p7.jpg" alt="P7">
      </div>

      <div class="slide">
        <img src="images/p8.jpg" alt="P8">
      </div>

      <div class="slide">
        <img src="images/p9.png" alt="P9">
      </div>

      <div class="slide">
        <img src="images/p10.jpg" alt="P10">
      </div>

      <div class="slide">
        <img src="images/p11.jpg" alt="P11">
      </div>

      <div class="slide">
        <img src="images/p12.png" alt="P12">
      </div>

      <div class="slide">
        <img src="images/p13.png" alt="P13">
      </div>

      <div class="slide">
        <img src="images/p14.png" alt="P14">
      </div>

      <div class="slide">
        <img src="images/p15.png" alt="P15">
      </div>

      <div class="slide">
        <img src="images/p16.jpg" alt="P16">
      </div>

      <div class="slide">
        <img src="images/p17.jpg" alt="P17">
      </div>

      <div class="slide">
        <img src="images/p18.jpg" alt="P18">
      </div>

      <div class="slide">
        <img src="images/p19.jpg" alt="P19">
      </div>

      <div class="slide">
        <img src="images/p20.png" alt="P20">
      </div>

    
    </div>

    <!-- ページ番号 -->

    <div class="page">
      <span id="pageNumber">1</span> / 21
    </div>

    <!-- ボタン -->

    <div class="controls">

      <button id="prevBtn">
        戻る
      </button>

      <button id="nextBtn">
        進む
      </button>

    </div>

  </div>

  <!-- フルスクリーン -->

  <div class="fullscreen" id="fullscreen">

    <button class="close-btn" id="closeBtn">
      閉じる
    </button>

    <img id="fullscreenImage" src="" alt="fullscreen">

  </div>

  <script>

    const slides = document.querySelectorAll('.slide');

    const pageNumber =
    document.getElementById('pageNumber');

    const fullscreen =
    document.getElementById('fullscreen');

    const fullscreenImage =
    document.getElementById('fullscreenImage');

    let currentIndex = 0;

    function showSlide(index){

      slides.forEach(slide=>{
        slide.classList.remove('active');
      });

      slides[index].classList.add('active');

      pageNumber.textContent = index + 1;
    }

    // 次へ

    document.getElementById('nextBtn')
    .addEventListener('click',()=>{

      currentIndex++;

      if(currentIndex >= slides.length){
        currentIndex = 0;
      }

      showSlide(currentIndex);

    });

    // 戻る

    document.getElementById('prevBtn')
    .addEventListener('click',()=>{

      currentIndex--;

      if(currentIndex < 0){
        currentIndex = slides.length - 1;
      }

      showSlide(currentIndex);

    });

    // フルスクリーン

    document.getElementById('viewer')
    .addEventListener('click',()=>{

      const currentImage =
      slides[currentIndex].querySelector('img');

      fullscreenImage.src =
      currentImage.src;

      fullscreen.classList.add('active');

    });

    // 閉じる

    document.getElementById('closeBtn')
    .addEventListener('click',()=>{

      fullscreen.classList.remove('active');

    });

    // 背景クリックで閉じる

    fullscreen.addEventListener('click',(e)=>{

      if(e.target === fullscreen){

        fullscreen.classList.remove('active');

      }

    });

  </script>

</body>
</html>
